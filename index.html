<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三國幻戰 - 序列對照工具 Pro Tab</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #0088a8; 
            --primary-hover: #3558d6;
            --predict-bg: #ffddaa; 
            --predict-border: #ff7700;
            --border: #e2e8f0; 
            --bg: #f1f5f9; 
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --highlight-red: #ff5511; 
            --match-bg: #cceeff;
            --match-border: #0088a8;
        }
        
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px 15px 10px 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        header { text-align: center; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 22px; font-weight: 800; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 8px;}
        
        .search-section { background: var(--card-bg); padding: 15px; border-radius: 16px; border: 1px solid var(--border); max-width: 900px; margin: auto; }
        
        /* 修改這裡：預設為電腦版單行排列 */
        .search-grid { display: flex; gap: 12px; align-items: center; }
        .inputs-group { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        
        .input-icon { position: absolute; left: 14px; color: var(--text-muted); pointer-events: none; }

        input { 
            width: 100%; box-sizing: border-box; padding: 14px 40px; 
            border: 2px solid var(--border); border-radius: 12px; 
            font-size: 15px; outline: none; transition: all 0.3s ease; 
            background: #f8fafc;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(71, 114, 250, 0.1); }
        
        .action-btns { display: flex; gap: 8px; flex-shrink: 0; }
        .btn { padding: 14px 20px; border-radius: 12px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-search { background: var(--primary); color: white; }
        .btn-reset { background: #e2e8f0; color: var(--text-main); }

        /* 新增手機版專屬排版優化 */
        @media (max-width: 600px) {
            .search-grid {
                flex-direction: column; /* 讓輸入框和按鈕上下排列 */
                align-items: stretch;
            }
            .action-btns {
                width: 100%; /* 讓按鈕區域填滿寬度 */
            }
            .btn {
                flex: 1; /* 讓兩個按鈕各佔 50% 寬度 */
                justify-content: center; /* 按鈕文字置中 */
            }
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .tab-btn {
            padding: 8px 20px;
            background: #e2e8f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(71, 114, 250, 0.3);
        }

        #resultsWrapper { padding: 10px 15px 60px 15px; max-width: 900px; margin: auto; }
        
        .result-panel { 
            display: none; 
            background: var(--card-bg); 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            height: 500px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            overflow: hidden; 
            animation: slideUp 0.4s ease-out; 
        }
        .result-panel.active { display: flex; flex-direction: column; }

        .panel-header { padding: 15px 20px; background: var(--match-bg); border-bottom: 1px solid var(--match-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .panel-title { color: var(--match-border); font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .predict-badge { background: var(--highlight-red); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .scroll-window { flex-grow: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .sequence-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .sequence-grid { grid-template-columns: repeat(4, 1fr); } }

        .item-card { border: 1px solid var(--border); padding: 12px; border-radius: 10px; background: #fafafa; font-size: 14px; position: relative; }
        .id-tag { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 600; }
        .special-name { color: var(--highlight-red); font-weight: 800; }
        
        .match-active { border: 2px solid var(--match-border) !important; background: var(--match-bg) !important; z-index: 1; }
        .predict-active { background: var(--predict-bg) !important; border: 2px solid var(--predict-border) !important; transform: scale(1.05); z-index: 2; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.2); }

        .suggestions { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: var(--card-bg); border: 1px solid var(--border); z-index: 2000; max-height: 250px; overflow-y: auto; border-radius: 12px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .suggest-item { padding: 12px 20px; cursor: pointer; font-size: 15px; }
        .suggest-item:hover { background: var(--match-bg); color: var(--primary); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sticky-top">
    <header>
        <h1><i class="fa-solid fa-gamepad"></i> 三國幻戰 4彈</h1>
    </header>
    <div class="search-section">
        <div class="search-grid">
            <div class="inputs-group">
                <div class="input-wrapper">
                    <i class="fa-solid fa-magnifying-glass input-icon"></i>
                    <input type="text" id="input1" placeholder="第一張" autocomplete="off">
                    <div id="list1" class="suggestions"></div>
                </div>
                <div class="input-wrapper">
                    <i class="fa-solid fa-layer-group input-icon"></i>
                    <input type="text" id="input2" placeholder="第二張" autocomplete="off" onfocus="this.value=''">
                    <div id="list2" class="suggestions"></div>
                </div>
            </div>
            <div class="action-btns">
                <button class="btn btn-search" onclick="triggerSearch()"><i class="fa-solid fa-crosshairs"></i> 定位</button>
                <button class="btn btn-reset" onclick="resetAll()"><i class="fa-solid fa-rotate-right"></i> 重置</button>
            </div>
        </div>
        <div id="tabsContainer" class="tabs-container"></div>
    </div>
</div>

<div id="resultsWrapper">

        <div>請輸入連兩筆抽取紀錄以定位序列</div>
    </div>
</div>

        const tabBox = document.getElementById('tabsContainer');

            tabBox.appendChild(tBtn);

            `;
            wrapper.appendChild(panel);

            const grid = document.getElementById(`grid-${idx}`);

            for(let i=1; i<=405; i++) {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.id = `panel-${idx}-item-${i}`;
                let content = dataObj[i];
                let contentHTML = `<b>${content}</b>`;

                card.innerHTML = `<span class="id-tag">#${i}</span>${contentHTML}`;
                fragment.appendChild(card);
            }
            grid.appendChild(fragment);

            if(idx === 0) scrollToCenter(idx, m);
        });
    }

    function switchTab(idx) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));

        scrollToCenter(idx, m);
    }

    function scrollToCenter(panelIdx, m) {
        setTimeout(() => {
            const target = document.getElementById(`panel-${panelIdx}-item-${m}`);

        }, 100);
    }

    function resetAll() {

                <div>請輸入連兩筆抽取紀錄以定位序列</div>
            </div>`;
    }

    function setupSuggest(id, lid) {
        const input = document.getElementById(id), list = document.getElementById(lid);
        input.onfocus = () => {
            if(id === 'input2') input.value = '';
            showList();
        };

        input.oninput = () => showList();

        function showList() {
            list.innerHTML = '';
            let val = (id === 'input1') ? '' : document.getElementById('input1').value.trim();
            let opts = (id === 'input1') ? uniqueItems : Array.from(new Set(Object.keys(dataObj).filter(k => dataObj[k] === val).map(k => dataObj[parseInt(k)+1]).filter(v => v)));
            const filtered = opts.filter(o => o.includes(input.value.trim()));
            filtered.forEach(f => {
                const d = document.createElement('div');
                d.className = 'suggest-item';
                d.innerText = f;
                d.onclick = () => { input.value = f; list.style.display = 'none'; id === 'input1' ? document.getElementById('input2').focus() : triggerSearch(); };
                list.appendChild(d);
            });
            list.style.display = filtered.length ? 'block' : 'none';
        }

        input.onblur = () => setTimeout(() => list.style.display = 'none', 150);
    }

    setupSuggest('input1', 'list1'); setupSuggest('input2', 'list2');
