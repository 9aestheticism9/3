<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三國幻戰 - 序列對照工具 Pro Tab</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #0088a8; 
            --primary-hover: #3558d6;
            --predict-bg: #ffddaa; 
            --predict-border: #ff7700;
            --border: #e2e8f0; 
            --bg: #f1f5f9; 
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --highlight-red: #ff5511; 
            --match-bg: #cceeff;
            --match-border: #0088a8;
        }
        
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px 15px 10px 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        header { text-align: center; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 22px; font-weight: 800; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 8px;}
        
        .search-section { background: var(--card-bg); padding: 15px; border-radius: 16px; border: 1px solid var(--border); max-width: 900px; margin: auto; }
        
        .search-grid { display: flex; gap: 12px; align-items: center; }
        .inputs-group { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        
        .input-icon { position: absolute; left: 14px; color: var(--text-muted); pointer-events: none; }

        input { 
            width: 100%; box-sizing: border-box; padding: 14px 40px; 
            border: 2px solid var(--border); border-radius: 12px; 
            font-size: 15px; outline: none; transition: all 0.3s ease; 
            background: #f8fafc;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(71, 114, 250, 0.1); }
        
        .action-btns { display: flex; gap: 8px; flex-shrink: 0; }
        .btn { padding: 14px 20px; border-radius: 12px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-search { background: #e2e8f0; color:  var(--text-main); }
        .btn-reset { background: #e2e8f0; color: var(--text-main); }

        /* A/B 卡切換按鈕樣式，調整了上間距與下間距 */
        .dataset-toggle {
            display: flex;
            gap: 12px;
            margin-top: 15px; /* 改為與上方搜尋欄保持距離 */
            margin-bottom: 5px;
        }
        .toggle-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 12px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .toggle-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 136, 168, 0.3);
        }

        @media (max-width: 600px) {
            .search-grid {
                flex-direction: column;
                align-items: stretch;
            }
            .action-btns {
                width: 100%;
            }
            .btn {
                flex: 1;
                justify-content: center;
            }
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .tab-btn {
            padding: 8px 20px;
            background: #e2e8f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        #resultsWrapper { padding: 10px 15px 60px 15px; max-width: 900px; margin: auto; }
        
        .result-panel { 
            display: none; 
            background: var(--card-bg); 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            height: 550px; 
            overflow: hidden; 
            animation: slideUp 0.4s ease-out; 
        }
        .result-panel.active { display: flex; flex-direction: column; }

        .panel-header { padding: 15px 20px; background: var(--match-bg); border-bottom: 1px solid var(--match-border); display: flex; justify-content: space-between; align-items: center; }
        .panel-title { color: var(--match-border); font-size: 15px; font-weight: 700; }
        .predict-badge { background: var(--highlight-red); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        
        .scroll-window { flex-grow: 1; overflow-y: auto; padding: 15px; }
        
        .sequence-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (min-width: 600px) { .sequence-grid { grid-template-columns: repeat(5, 1fr); gap: 12px; } }

        .item-card { 
            border: 1px solid var(--border); 
            padding: 8px 4px; 
            border-radius: 8px; 
            background: #fafafa; 
            font-size: 16px; 
            text-align: center; 
        }
        .id-tag { font-size: 11px; color: var(--text-muted); display: block; }
        .special-name { color: var(--highlight-red); font-weight: 900; }
        
        .match-active { border: 2px solid var(--match-border) !important; background: var(--match-bg) !important; }
        .predict-active { background: var(--predict-bg) !important; border: 2px solid var(--predict-border) !important; transform: scale(1.05); }

        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); z-index: 2000; max-height: 250px; overflow-y: auto; border-radius: 12px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .suggest-item { padding: 12px 20px; cursor: pointer; }
        .suggest-item:hover { background: var(--match-bg); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
    </style>
</head>

    <div class="search-section">
        <div class="search-grid">

                <div class="input-wrapper">

            <div class="action-btns">

            <button id="btnB" class="toggle-btn" onclick="switchDataset('B')">B 卡</button>

        <div id="tabsContainer" class="tabs-container"></div>

</div>

        if(!v1 || !v2) return;

        let matches = [];
        if (currentDataset === 'A') {
            matches = Object.keys(dataObjA).filter(k => dataObjA[k] === v1 && dataObjA[parseInt(k)+1] === v2).map(k => ({ index: Number(k), data: dataObjA, name: 'A卡序列', total: 405 }));
        } else {
            dataObjB.forEach(seq => {
                const keys = Object.keys(seq).filter(k => !isNaN(k));
                keys.forEach(k => {
                    k = Number(k);
                    if (seq[k] === v1 && seq[k+1] === v2) matches.push({ index: k, data: seq, name: seq.name, total: 45 });
                });
            });
        }
        
        if(matches.length === 0) {
            wrapper.innerHTML = `<div style="text-align:center; margin-top:100px; color:var(--highlight-red);">❌ 找不到對應序列</div>`;
            return;
        }

        matches.forEach((mObj, idx) => {
            const m = mObj.index;
            const tBtn = document.createElement('button');
            tBtn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
            tBtn.innerText = currentDataset === 'A' ? `結果 ${idx+1} (#${m})` : `${mObj.name.split(' ')[0]} (#${m})`;
            tBtn.onclick = () => switchTab(idx);
            tabBox.appendChild(tBtn);

            const panel = document.createElement('div');
            panel.className = `result-panel ${idx === 0 ? 'active' : ''}`;
            panel.id = `panel-${idx}`;
            panel.innerHTML = `
                <div class="panel-header">
                    <div class="panel-title">${mObj.name} - #${m}</div>
                    <div class="predict-badge">下一張：${mObj.data[m+2] || 'END'}</div>
                </div>
                <div class="scroll-window"><div class="sequence-grid" id="grid-${idx}"></div></div>
            `;
            wrapper.appendChild(panel);

            const grid = document.getElementById(`grid-${idx}`);
            for(let i=1; i<=mObj.total; i++) {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.id = `panel-${idx}-item-${i}`;
                if(i === m || i === m+1) card.classList.add('match-active');
                if(i === m+2) card.classList.add('predict-active');
                let content = mObj.data[i] || "";
                let isSpecial = redNames.some(n => content.includes(n));
                card.innerHTML = `<span class="id-tag">#${i}</span><b class="${isSpecial?'special-name':''}">${content}</b>`;
                grid.appendChild(card);
            }
            if(idx === 0) scrollToCenter(idx, m);
        });
    }

    function switchTab(idx) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        document.querySelectorAll('.result-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
        
        const btnText = document.querySelectorAll('.tab-btn')[idx].innerText;
        const match = btnText.match(/#(\d+)/);
        if (match) {
            scrollToCenter(idx, parseInt(match[1]));
        }
    }

    function scrollToCenter(pIdx, m) {
        setTimeout(() => {
            const target = document.getElementById(`panel-${pIdx}-item-${m}`);
            if(target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
    }

    function resetAll() {
        document.getElementById('input1').value = '';
        document.getElementById('input2').value = '';
        document.getElementById('tabsContainer').innerHTML = '';
        document.getElementById('resultsWrapper').innerHTML = `
            <div style="text-align:center; color:#94a3b8; margin-top:100px;">
                <i class="fa-solid fa-chart-line" style="font-size: 40px; color: #cbd5e1; margin-bottom: 15px;"></i>
                <div>請輸入連兩筆抽取紀錄以定位序列</div>
            </div>`;
    }

    function setupSuggest(id, lid) {
        const input = document.getElementById(id), list = document.getElementById(lid);
        input.onfocus = () => { if(id==='input2') input.value=''; showList(); };
        input.oninput = () => showList();

        function showList() {
            list.innerHTML = '';
            const v1 = document.getElementById('input1').value.trim();
            let opts = [];
            
            if (id === 'input1') {
                opts = currentDataset === 'A' ? uniqueItemsA : uniqueItemsB;
            } else {
                if (currentDataset === 'A') {
                    opts = Array.from(new Set(Object.keys(dataObjA).filter(k => dataObjA[k] === v1).map(k => dataObjA[parseInt(k)+1]).filter(v => v)));
                } else {
                    let nexts = [];
                    dataObjB.forEach(seq => {
                        const keys = Object.keys(seq).filter(k => !isNaN(k));
                        keys.forEach(k => {
                            k = Number(k);
                            if (seq[k] === v1 && seq[k+1]) nexts.push(seq[k+1]);
                        });
                    });
                    opts = Array.from(new Set(nexts));
                }
            }

            const filtered = opts.filter(o => o.includes(input.value.trim()));
            filtered.forEach(f => {
                const d = document.createElement('div');
                d.className = 'suggest-item';
                d.innerText = f;
                d.onclick = () => { 
                    input.value = f; 
                    list.style.display = 'none'; 
                    id === 'input1' ? document.getElementById('input2').focus() : triggerSearch(); 
                };
                list.appendChild(d);
            });
            list.style.display = filtered.length ? 'block' : 'none';
        }
        input.onblur = () => setTimeout(() => list.style.display = 'none', 200);
    }

    setupSuggest('input1', 'list1'); setupSuggest('input2', 'list2');
</script>

</body>
</html>
